    /* //class selector  */
    .box{
        height: 100px;
        width: 100px;
        background-color: aqua;
        border: 2px solid black;
        margin: 1%;
    }
    .container{
       
        display: grid;
        grid-template-columns:repeat(3,100px);
        gap: 10px;
        /* justify-content: center;
        align-items: center; */
    }

    /* id selector  */
    #box4{
        grid-column: span 3;
        width: 300px;
        
    }
    /* universal selector  */
    *{
        margin: 10%;
        background-color: black;
    }
    /* group selectors in css  */

    #h1, #h2, #h3{
        height: 100px;
        width: 100px;
        background-color: red;
        border: 2px solid black;
        margin: 1%;
    }
    #parent{
        height: 100px;
        width: 100px;
        background-color: blue;
        border: 2px solid black;
        margin: 1%;
    }
    /* decendent selector in css  */
    #parent p{
        background-color: yellow;
        height: 50px;
        width: 50px;
    }
    #parent div{
        background-color: green;
        height: 50px;
        width: 50px;
    }
    /* child selector in css  */    
    #parent1>p{
        background-color: purple;
        height: 50px;
        width: 50px;
    }
    /* attribute selector in css   */
    input[name="password"]{
        height: 30px;
        width: 200px;
        margin: 10px;
    }
</style>
